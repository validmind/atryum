<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atryum — Tool approval server for agents</title>
<link rel="icon" type="image/svg+xml" href="assets/atryum-logo-favicon.svg" />
<link rel="stylesheet" href="assets/install.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="assets/includes.js" defer></script>
<style>
  :root {
    --color-white: #FFFFFF;
    --brand-300: #ed4899;
    --brand-400: #de267e;
    --brand-500: #c80d65;
    --bs-25:  #f4fbfc;
    --bs-50:  #d8f7fa;
    --bs-300: #62c2ce;
    --bs-700: #105c66;
    --bs-800: #083e44;
    --bs-900: #052b30;
    --bs-950: #041c21;
    --neutral-25:  #fcfdfd;
    --neutral-50:  #f7f9f9;
    --neutral-100: #f2f6f6;
    --neutral-200: #e0e7e7;
    --neutral-300: #c6d0d0;
    --neutral-400: #a4afaf;
    --neutral-500: #7e8888;
    --neutral-600: #596162;
    --neutral-700: #3b4141;
    --neutral-800: #262a2a;

    --text-primary: var(--neutral-800);
    --text-subtle:  var(--neutral-500);
    --border-base:  var(--neutral-200);

    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

    --radius-md: 0.375rem;
    --radius-lg: 0.5rem;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--color-white);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; text-decoration: none; }

  ::selection { background: var(--brand-300); color: #fff; }

  /* ───────────────── Top bar ───────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 64px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border-base);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand img { height: 24px; width: auto; display: block; }

  nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 12px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    color: var(--neutral-600);
    transition: background var(--dur, 150ms) ease, color 150ms ease;
  }
  .nav-link:hover,
  .nav-link[aria-current="page"] {
    background: var(--bs-50);
    color: var(--bs-800);
  }
  .nav-link svg { width: 17px; height: 17px; }

  .nav-dropdown {
    position: relative;
  }
  .nav-dropdown summary {
    cursor: pointer;
    list-style: none;
  }
  .nav-dropdown summary::-webkit-details-marker { display: none; }
  .nav-dropdown summary::after {
    content: "";
    width: 6px;
    height: 6px;
    border-right: 1.5px solid currentColor;
    border-bottom: 1.5px solid currentColor;
    transform: translateY(-1px) rotate(45deg);
  }
  .nav-dropdown[open] summary::after {
    transform: translateY(2px) rotate(225deg);
  }
  .nav-menu {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    min-width: 240px;
    width: max-content;
    padding: 6px;
    border: 1px solid var(--border-base);
    border-radius: var(--radius-lg);
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 10px 28px rgba(5, 28, 32, 0.12);
  }
  .nav-menu a {
    display: block;
    padding: 8px 10px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    color: var(--neutral-600);
    white-space: nowrap;
  }
  .nav-menu a:hover,
  .nav-menu a[aria-current="page"] {
    background: var(--bs-50);
    color: var(--bs-800);
  }

  .nav-cta {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: var(--bs-800);
    border: 1px solid var(--bs-800);
    transition: background 150ms ease;
  }
  .nav-cta:hover { background: var(--bs-900); }
  .nav-cta svg { width: 17px; height: 17px; }

  /* ───────────────── Main / hero ───────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 24px 96px;
    position: relative;
  }

  /* faint top vignette to ground the hero without a gradient */
  main::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 80% at 50% -10%, var(--bs-25) 0%, rgba(255,255,255,0) 60%);
    pointer-events: none;
  }

  .hero-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 720px;
    width: 100%;
  }

  .hero-logo { height: 76px; width: auto; margin-bottom: 36px; }

  .tagline {
    font-size: clamp(2rem, 5.5vw, 3.25rem);
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 1.08;
    color: var(--bs-800);
    text-wrap: balance;
  }

  .subline {
    margin-top: 18px;
    font-size: 17px;
    color: var(--text-subtle);
    max-width: 480px;
    text-wrap: pretty;
  }
  .subline .accent { color: var(--brand-400); font-weight: 500; }

  .hero-meta {
    margin-top: 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-subtle);
  }
  .dot {
    display: inline-block;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--neutral-300);
    flex: 0 0 auto;
  }
  .hero-meta a { color: var(--bs-700); font-weight: 500; }
  .hero-meta a:hover { color: var(--brand-400); }

  /* ───────────────── Footer ───────────────── */
  footer {
    border-top: 1px solid var(--border-base);
    padding: 28px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .foot-left {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-subtle);
  }
  .foot-left .vm {
    color: var(--bs-800);
    font-weight: 600;
  }
  .foot-links {
    display: flex;
    align-items: center;
    gap: 22px;
    font-size: 13px;
  }
  .foot-links a { color: var(--neutral-600); font-weight: 500; transition: color 150ms ease; }
  .foot-links a:hover { color: var(--brand-400); }

  @media (max-width: 600px) {
    header { padding: 0 18px; }
    footer { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

  <div data-include="partials/header.html"></div>

  <main>
    <div class="hero-inner">
      <img class="hero-logo" src="assets/atryum-logo.png" alt="Atryum" />
      <h1 class="tagline">The control plane for agent actions.</h1>
      <p class="subline">Self-hosted and lightweight. Every tool your agents call passes through one place to be approved, denied, and logged.</p>

      <div class="install install--hero" id="install">
        <div class="install-label">Install</div>
        <div data-include="partials/install-commands.html"></div>
      </div>
    </div>
  </main>

  <div data-include="partials/footer.html"></div>

</body>
</html>
