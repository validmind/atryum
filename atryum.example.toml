[server]
listen_addr = ":8080"
log_level = "info"

# SQLite (default):
database_driver = "sqlite"
database_path = "./atryum.db"

# PostgreSQL (optional – uncomment and remove sqlite lines above):
# database_driver = "postgres"
# database_dsn = "postgres://atryum:atryum@localhost:5432/atryum?sslmode=disable"

[defaults]
request_timeout_seconds = 30

# Bootstrap-only upstream definitions.
# On startup, Atryum seeds mcp_servers from these entries only when the DB is empty.
# After bootstrap, runtime resolution uses SQLite as the source of truth.
[[upstreams]]
name = "shortcut"
mode = "stdio"
command = "npx"
args = ["-y", "@shortcut/mcp@latest"]
timeout_seconds = 60
enabled = true

[upstreams.env]
SHORTCUT_API_TOKEN = "replace-me"
SHORTCUT_READONLY = "true"

# Optional HTTP bootstrap example:
# [[upstreams]]
# name = "github"
# mode = "http"
# base_url = "http://localhost:9000"
# timeout_seconds = 30
# enabled = true
# auth_token = ""
