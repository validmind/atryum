[server]
listen_addr = ":8080"
# Public browser-facing base URL used for OAuth redirect_uri generation.
# In local dev this should point at the Atryum API server, not the Vite UI.
# In production/Kubernetes it should be the ingress URL.
public_base_url = "http://localhost:8080"
# SQLite remains the default. database_path is used when database_url is empty.
database_path = "./atryum.db"
# Optional: select storage provider by URL scheme.
# postgres/postgresql uses PostgreSQL via pgx stdlib.
# sqlite/file/no scheme/empty uses SQLite.
# Local optional test/dev PostgreSQL DSN:
# database_url = "postgresql://postgres:password@127.0.0.1:5432/postgres"
database_url = ""
log_level = "info"

[backend]
# Optional ValidMind backend connection check. When base_url is set, Atryum
# verifies credentials at startup by calling:
# GET /api/atryum/unstable/connection
#
# Machine-user credentials are preferred when configured. If machine_key and
# machine_secret are both empty, Atryum uses normal user API credentials instead.
# User API credentials are bound to a single organization, so the Settings UI
# will use that organization automatically.
#
# base_url defaults to https://app.prod.validmind.ai/ when omitted or when no
# TOML file is present. Set base_url = "" only when you want to disable the
# ValidMind backend integration entirely.
#
# Environment variables override these TOML values:
# VM_BASE_URL
# VM_MACHINE_KEY
# VM_MACHINE_SECRET
# VM_API_KEY
# VM_API_SECRET
# VM_CONNECTION_TIMEOUT_SECONDS
# VM_EVALUATE_TIMEOUT_SECONDS
base_url = "https://app.prod.validmind.ai/"
machine_key = ""
machine_secret = ""
api_key = ""
api_secret = ""
connection_timeout_seconds = 5

[defaults]
request_timeout_seconds = 30

# Optional Claude Managed Agents events bridge. Declare one [[managed_agents]]
# table per Anthropic account/workspace you want to watch. When an entry's
# api_key is set, Atryum connects outbound to Anthropic's Managed Agents
# "events and streaming" API for every session registered (via
# POST /api/v1/admin/managed-agents/sessions) against that account. It records
# each session event in the invocations table and, when a session blocks on a
# tool call (permission_policy = always_ask, or a custom tool), runs the normal
# approval rules and replies to Claude with the decision. Entries with an empty
# api_key are skipped; with no usable entry the bridge is disabled. See
# examples/managed-agents/.
#
# Environment overrides for api_key (single-account convenience only):
# ATRYUM_MANAGED_AGENTS_API_KEY (highest), then ANTHROPIC_API_KEY. These apply
# only when zero or one [[managed_agents]] entry is configured. With multiple
# entries each must set its own api_key in TOML.
[[managed_agents]]
name    = "default"   # unique label; targeted by the session-registration "account" field
api_key = ""
# Optional tuning (defaults shown):
# base_url                  = "https://api.anthropic.com"
# poll_interval_millis      = 1000
# reconnect_backoff_seconds = 2
# client_name               = "claude-managed-agents"
# client_version            = ""

# Add more accounts by repeating the table:
# [[managed_agents]]
# name    = "staging"
# api_key = ""

# Agent sync and AI evaluation settings (org, record type, charter field)
# are managed through the Atryum Settings UI and stored in the database.
# They no longer need to be configured here.

# Static API key/secret pair that protects the read-only invocation reporting
# endpoints (GET /invocations/{agent_id}, GET /agent_ids). Callers must send
# both `X-API-Key` and `X-API-Secret` headers matching these values. When
# either field is empty, those endpoints refuse every request with 503.
[api_key]
key = ""
secret = ""

# Local-only auth debug mode. When true, the Authorization header is ignored
# entirely on /mcp/: no bearer token is required and no identity is set on
# the request context. Never enable outside local debugging.
[auth_debug]
skip_verify = false

# Bootstrap-only upstream definitions.
# On startup, Atryum seeds mcp_servers from these entries only when the DB is empty.
# After bootstrap, runtime resolution uses SQLite as the source of truth.
[[upstreams]]
name = "shortcut"
mode = "stdio"
command = "npx"
args = ["-y", "@shortcut/mcp@latest"]
timeout_seconds = 60
enabled = true

[upstreams.env]
SHORTCUT_API_TOKEN = "replace-me"
SHORTCUT_READONLY = "true"

# Optional HTTP bootstrap example:
# [[upstreams]]
# name = "github"
# mode = "http"
# base_url = "http://localhost:9000"
# timeout_seconds = 30
# enabled = true
# auth_token = ""

# Optional HTTP + pre-shared OAuth bootstrap (Slack-style: AS doesn't support
# Dynamic Client Registration, so the admin has registered an app with the
# provider out-of-band and pasted client credentials below). Bootstrap-only:
# these values seed mcp_servers when the DB is empty and are ignored on
# subsequent runs. For ASes that support DCR (Datadog, Shortcut, ...),
# leave these blank — discovery + DCR will populate them on first Connect.
# [[upstreams]]
# name              = "slack"
# mode              = "http"
# base_url          = "https://mcp.slack.com/mcp"
# timeout_seconds   = 30
# enabled           = true
# oauth_client_id     = "1234567890.abcdef"
# oauth_client_secret = "shhhhh"
# # oauth_authorize_url / oauth_token_url are auto-discovered from
# # .well-known/oauth-authorization-server when blank — only set them if
# # the provider doesn't publish discovery metadata.
# # oauth_authorize_url = ""
# # oauth_token_url     = ""
# # Leave oauth_scopes empty to let the OAuth app's registered scopes drive
# # the grant (recommended for Slack). Set to a space-separated subset to
# # scope the issued token down at authorize time.
# # oauth_scopes        = "chat:write channels:history"

# Inbound OAuth bearer-token authentication for /mcp/. Multiple [[auth]]
# sections are supported; the validator picks the matching one based on
# the token's `iss` claim. Other routes (/ui, /api/v1/admin/*,
# /api/v1/external/*, /healthz) are NOT affected.
#
# [[auth]]
# enabled        = true
# issuer         = "https://keycloak.example/realms/atryum"
# audience       = "atryum"
# # jwks_url is optional. When omitted, OIDC discovery
# # (issuer + /.well-known/openid-configuration) is used.
# # jwks_url     = "https://keycloak.example/realms/atryum/protocol/openid-connect/certs"
# # Leave required_scope empty or omit it to allow tokens without a scope claim.
# required_scope = "atryum:mcp"
# agent_id_claim = "client_id"
#
# [[auth]]
# enabled        = true
# issuer         = "https://your-tenant.us.auth0.com/"
# audience       = "https://atryum.example/mcp"
# # Leave required_scope empty or omit it to allow tokens without a scope claim.
# required_scope = "atryum:mcp"
# agent_id_claim = "client_id"
