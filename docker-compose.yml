services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atryum
      POSTGRES_USER: atryum
      POSTGRES_PASSWORD: atryum
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atryum"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
